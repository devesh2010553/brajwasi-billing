<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Login – Brajwasi</title>
<link rel="manifest" href="{{ url_for('manifest') }}">
<meta name="theme-color" content="#1e6ebb">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
<style>
:root { --accent:#1e6ebb; --accent2:#1557a0; --border:#bfdbfe; --radius:12px; --text:#1e293b; --muted:#64748b; }
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background: linear-gradient(160deg,#dbeafe 0%,#e0f2fe 50%,#f0f9ff 100%);
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
}
.card {
  background:#fff; border-radius:20px; padding:32px 26px;
  box-shadow:0 8px 32px rgba(30,110,187,0.15); width:100%; max-width:360px;
}
.logo { text-align:center; margin-bottom:24px; }
.logo-icon { font-size:2.8rem; margin-bottom:6px; }
.logo h1 { font-size:1.3rem; font-weight:800; color:var(--accent); }
.logo p  { font-size:0.78rem; color:var(--muted); margin-top:3px; }
label { display:block; font-size:0.78rem; font-weight:600; color:var(--muted); margin-bottom:6px; }
input[type=text], input[name=code] {
  width:100%; background:#f8fbff; border:1.5px solid var(--border);
  border-radius:10px; color:var(--text); font-size:1rem;
  padding:12px 14px; transition:border-color 0.2s;
  -webkit-appearance:none;
}
input:focus { outline:none; border-color:var(--accent); background:#fff; }
.btn {
  width:100%; padding:13px; background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; border:none; border-radius:var(--radius);
  font-size:1rem; font-weight:700; cursor:pointer; margin-top:14px;
  box-shadow:0 3px 10px rgba(30,110,187,0.3);
}
.error { background:#fef2f2; border:1px solid #fca5a5; color:#dc2626; border-radius:8px; padding:10px 12px; font-size:0.85rem; margin-top:10px; }
#installBanner {
  display:none; margin-top:16px; background:#dbeafe; border:1.5px solid var(--border);
  border-radius:var(--radius); padding:12px; text-align:center;
}
#installBanner p { font-size:0.83rem; color:var(--accent); font-weight:600; margin-bottom:3px; }
#installBanner span { font-size:0.76rem; color:var(--muted); }
#installBtn { margin-top:8px; width:100%; background:var(--accent); color:#fff; border:none; padding:9px; border-radius:8px; font-size:0.9rem; cursor:pointer; font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🚗</div>
    <h1>Brajwasi Travels</h1>
    <p>Driver Daily Entry Portal</p>
  </div>
  <form method="post">
    <label>Enter Your Code / अपना कोड डालें</label>
    <input name="code" placeholder="Driver code" required autocomplete="off">
    <button class="btn" type="submit">Login →</button>
    {% if msg %}<div class="error">{{ msg }}</div>{% endif %}
  </form>

  <div id="installBanner">
    <p>📲 Install App / ऐप इंस्टॉल करें</p>
    <span>Faster access &amp; offline use</span>
    <button id="installBtn">⬇️ Install</button>
  </div>
</div>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js');
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').style.display='block';});
document.getElementById('installBtn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted')document.getElementById('installBanner').style.display='none';deferredPrompt=null;});
window.addEventListener('appinstalled',()=>{document.getElementById('installBanner').style.display='none';});
</script>
</body>
</html>

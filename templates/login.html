<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Login – Brajwasi</title>
<link rel="manifest" href="{{ url_for('manifest') }}">
<meta name="theme-color" content="#1e6ebb">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
<div class="login-card">
  <div class="logo">
    <img src="{{ url_for('static', filename='icons/icon-192.png') }}"
         class="login-logo-icon"
         alt="Brajwasi Travels"
         width="80"
         height="80"
         loading="eager"
         decoding="async">
    <h1>Brajwasi Travels</h1>
    <p>Driver Daily Entry Portal</p>
  </div>

  <form method="post">
    <label>Enter Your Code / अपना कोड डालें</label>
    <input name="code" placeholder="Driver code" required autocomplete="off">
    <button class="btn" type="submit">Login →</button>
    {% if msg %}<div class="error">{{ msg }}</div>{% endif %}
  </form>

  <div id="installBanner">
    <p>📲 Install App / ऐप इंस्टॉल करें</p>
    <span>Faster access &amp; offline use</span>
    <button id="installBtn">⬇️ Install</button>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').catch(e => console.log('SW error', e));
}

let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('installBanner').style.display = 'none';
  }
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
});
</script>
</body>
</html>
